                                            <div className="absolute bottom-3 right-3 px-2 py-0.5 bg-black/80 text-[10px] text-gray-400 font-lato">{v.duration}</div>
                                        </div>
                                        <div className="p-6 piano-black-gloss">
                                            <h3 className="font-zen text-base text-gray-200 mb-6 line-clamp-1 group-hover:text-white leading-relaxed">{v.title}</h3>
                                            <div className="flex justify-between items-center text-[10px] font-lato uppercase">
                                                <span className="text-gray-500 flex items-center gap-1 font-bold text-left"><Monitor className="w-3 h-3 text-left" /> {v.views}</span>
                                                <span className={v.youtubeId ? 'text-[#cfb991] font-bold' : 'text-gray-700'}>{v.youtubeId ? 'PLAYBACK' : 'COMING SOON'}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="absolute -bottom-10 left-0 right-0 reflection opacity-0 group-hover:opacity-15 transition-opacity pointer-events-none" aria-hidden="true"><img src={v.thumbnail} alt="" className="grayscale" /></div>
                                </article>
                            ))}
                        </div>
                    </main>

                    {showAbout && (
                        <div className="fixed inset-0 z-[100] bg-[#050505]/98 backdrop-blur-md overflow-y-auto animate-in text-center p-6" role="dialog">
                            <button onClick={() => setShowAbout(false)} className="fixed top-6 right-6 text-gray-500 hover:text-white z-[110] transition-colors p-2 focus:outline-none" aria-label="閉じる"><XIcon className="w-8 h-8" /></button>
                            <div className="container mx-auto px-4 py-24 text-center max-w-4xl relative">
                                <div className="absolute inset-0 opacity-5 pointer-events-none" style={{backgroundImage: 'radial-gradient(circle at center, #cfb991 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                                <img src={LOGO_URL} className="w-32 mx-auto mb-12 opacity-90 drop-shadow-[0_0_15px_rgba(207,185,145,0.2)]" alt="ロゴ" />
                                <h2 className="font-zen text-3xl md:text-5xl font-bold mb-4 uppercase text-white">次世代への手紙<br/><span className="text-xl md:text-2xl mt-4 block font-normal text-gray-400">・リターンズ・</span></h2>
                                <p className="font-mincho text-xl md:text-2xl text-[#cfb991] italic mb-16 tracking-widest leading-relaxed text-center">「不滅の音楽を、もう一度, 新しい形で。」</p>
                                <div className="font-mincho text-gray-300 leading-[2.2] space-y-12 text-justify text-base md:text-lg max-w-3xl mx-auto tracking-wide">
                                    <p className="border-l-2 border-[#cfb991]/30 pl-6 italic">当番組は、昭和・平成の邦楽シーンを彩った名曲たちを、オリコンの公式記録に基づいたランキング形式で紐解く音楽アーカイブチャンネルです。</p>
                                    
                                    <section className="bg-white/5 p-8 md:p-12 rounded-sm border border-white/10 shadow-inner">
                                        <h3 className="font-zen text-xl md:text-2xl text-center mb-8 text-white font-bold tracking-widest flex items-center justify-center gap-3">📜 再始動にあたって</h3>
                                        <p className="mb-8 leading-relaxed text-justify">かつて私はYouTubeで5万人以上のチャンネル登録者さんと共に, 音楽を語り合う時間を過ごしていました。 ある日, 自らの不器用な手違いにより, その大切なチャンネルを一瞬にして消し去ってしまいました。実質1年間という短い運営期間になってしまいました。</p>
                                        <p className="leading-relaxed">応援してくださっていた皆様への申し訳なさと, あまりのショックから, しばらくYouTube活動をお休みしていましたが, 今, ようやく前を向く決心がつきました。 かつてお届けした動画も, 今の視点で丁寧にリメイクし, 新しい息吹を吹き込みながら少しずつ公開していきます。</p>
                                    </section>

                                    <section className="py-8">
                                        <h3 className="font-zen text-xl md:text-2xl text-center mb-8 text-white font-bold tracking-widest flex items-center justify-center gap-3">🎤 番組のスタンス</h3>
                                        <p className="mb-8 leading-relaxed text-justify">私たちは、売上枚数という数字だけで音楽の良し悪しを決めたいわけではありません。 ランキングはあくまで, あの時代にどれだけ多くの人の手にその歌が渡ったかを示す「時代の地図」だと考えています。 順位そのものを楽しむエンターテインメントとして。 そして, その数字の向こう側にある「当時の空気感」や「作り手の執念」を次世代へ語り継ぐ場として、この番組を再構築していきます。</p>
                                    </section>

                                    <div className="grid md:grid-cols-2 gap-8 pt-4">
                                        <div className="bg-gradient-to-br from-white/10 to-transparent p-8 rounded-sm border border-white/5 text-center">
                                            <h4 className="font-zen text-[#cfb991] mb-4 text-lg font-bold">50代以上の皆様へ</h4>
                                            <p className="text-sm opacity-90">イントロ一つで当時の記憶が鮮明に蘇る、良質な時間を。</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-white/10 to-transparent p-8 rounded-sm border border-white/5 text-center">
                                            <h4 className="font-zen text-[#cfb991] mb-4 text-lg font-bold">20〜30代の皆様へ</h4>
                                            <p className="text-sm opacity-90">今のJ-POPの源流にある、本物の音楽の発見を。</p>
                                        </div>
                                    </div>

                                    <div className="text-center space-y-4 pt-8">
                                        <p className="text-lg md:text-xl font-medium text-white tracking-widest">止まっていた時計を、再び動かします。</p>
                                        <p className="text-lg md:text-xl font-medium text-white tracking-widest">また皆様と、不滅の名曲について語り合える場所を育てていければ幸いです。</p>
                                        <p className="text-sm md:text-base font-lato opacity-60 pt-4">2026年2月10日</p>
                                    </div>

                                    <div className="mt-24 border-t border-white/10 pt-16 text-center">
                                        <h3 className="font-zen text-xl md:text-2xl text-white mb-8 font-bold tracking-widest">🔴 チャンネル登録して応援お願いします</h3>
                                        <div className="flex flex-col items-center gap-6">
                                            <a href={COMMON_SUB_LINK} target="_blank" className="inline-flex items-center gap-4 px-12 py-5 bg-[#cc0000] hover:bg-[#ff0000] text-white font-bold tracking-[0.3em] rounded-sm transition-all shadow-2xl transform hover:-translate-y-1 uppercase text-sm">チャンネル登録して応援お願いします</a>
                                            <p className="font-lato text-xs text-gray-500 tracking-widest opacity-50 font-bold">https://www.youtube.com/@次世代への手紙</p>
                                        </div>
                                    </div>
                                    <div className="mt-20 text-right font-zen text-sm text-[#cfb991] tracking-[0.3em] font-medium italic opacity-80 border-r-2 border-[#cfb991] pr-4 inline-block float-right">【不滅の魂 制作委員会】</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeVideo && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-2xl overflow-y-auto animate-in text-left">
                            <div className="min-h-full flex items-center justify-center p-4 md:p-8 text-left">
                                <button onClick={() => { setActiveVideo(null); setShowDetails(false); }} className="fixed top-6 right-6 text-gray-400 hover:text-white z-[110] transition-colors p-2 focus:outline-none"><XIcon className="w-8 h-8" /></button>
                                <div className="w-full max-w-5xl">
                                    <div className="aspect-video bg-black border border-white/10 rounded-sm overflow-hidden mb-10 shadow-[0_0_50px_rgba(207,185,145,0.15)]">
                                        <iframe className="w-full h-full" src={`https://www.youtube.com/embed/${activeVideo.youtubeId}?autoplay=1&rel=0`} frameBorder="0" allowFullScreen title={activeVideo.title}></iframe>
                                    </div>
                                    <div className="border-l-2 border-[#cfb991] pl-8 pb-20 text-left">
                                        <h2 className="font-zen text-2xl md:text-3xl text-white mb-8 leading-tight tracking-wide">{activeVideo.title}</h2>
                                        <div className="font-mincho text-gray-300 text-sm md:text-base leading-relaxed whitespace-pre-wrap">{renderDescription(activeVideo.desc)}</div>
                                        {activeVideo.rankingDetails && (
                                            <div className="mt-12 text-left">
                                                {!showDetails ? (
                                                    <button onClick={() => setShowDetails(true)} className="text-[#cfb991] text-sm font-lato tracking-widest border-b border-[#cfb991] pb-1 hover:text-white transition-colors">
                                                        {activeVideo.category === '名曲フラッシュバック' ? '▼ もっと詳細を見る' : '▼ ランキングの詳細はこちら！'}
                                                    </button>
                                                ) : (
                                                    <div className="animate-in pt-8 border-t border-white/10 mt-8 font-mincho text-gray-300 text-sm md:text-base leading-relaxed whitespace-pre-wrap text-left">
                                                        <div className="mb-10 text-left">{renderDescription(activeVideo.rankingDetails)}</div>
                                                        <button onClick={() => setShowDetails(false)} className="block mt-8 text-gray-500 text-[10px] tracking-widest hover:text-white uppercase transition-colors font-bold tracking-[0.2em]">▲ CLOSE DETAILS</button>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="py-24 border-t border-white/5 flex flex-col items-center bg-[#020202] text-center">
                        <img src={LOGO_URL} alt="logo" className="h-10 opacity-20 mb-10 grayscale hover:grayscale-0 transition-all" />
                        <div className="flex space-x-10 mb-12 text-gray-600">
                             <a href={COMMON_SUB_LINK} target="_blank" className="hover:text-[#cfb991] transition-colors" aria-label="YouTube"><YoutubeIcon className="w-6 h-6" /></a>
                             <a href="https://x.com/ZZLAB48210" target="_blank" className="hover:text-[#cfb991] transition-colors group" aria-label="Twitter X"><TwitterXIcon className="w-5 h-5"/></a>
                             <a href="https://www.instagram.com/immortalsoul_2026/" target="_blank" className="hover:text-[#cfb991] transition-colors" aria-label="Instagram"><InstagramIcon className="w-6 h-6" /></a>
                        </div>
                        <p className="text-[10px] text-gray-700 tracking-[0.3em] uppercase font-lato text-center">&copy; 2026 次世代への手紙 / 不滅の魂 制作委員会</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
