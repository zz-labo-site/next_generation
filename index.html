                desc: `爆発的なロックサウンドとNOKKOの圧倒的なヴォーカルで80年代の音楽シーンに革命を起こし、瞬く間にトップバンドへと登り詰めたREBECCA。\n\n社会現象を巻き起こした不朽の名曲『フレンズ』をはじめ、彼女たちが駆け抜けた時代を象徴するシングル売上TOP5（1980年代発売）をランキング形式でご紹介します。\n\nSONYのCMソングや映画の主題歌、人気ドラマのエンディングなど、常に時代の最先端を走り、私たちの心を掴んで離さなかった珠玉のメロディをお楽しみください。NOKKOの躍動感あふれるパフォーマンスとともに、あの熱狂的な情熱が鮮やかに蘇ります。\n\nこれは単なる懐古ではなく、あの時代が放っていた熱量を次世代へと繋ぐための記録です。\nあなたの魂を揺さぶった一曲はどれですか？ ぜひコメントで教えてください。\n\n▼チャンネル登録で応援よろしくお願いします！\n${COMMON_SUB_LINK}`,
                rankingDetails: `【ランキング詳細】\n\n第1位：フレンズ（1985/10/21発売）最高位3位 / 売上30.7万枚\n第2位：ラズベリー・ドリーム（1986/05/02発売）最高位4位 / 売上21.8万枚\n第3位：モノトーン・ボーイ（1987/04/22発売）最高位3位 / 売上15.4万枚\n第4位：モーター・ドライヴ（1986/06/21発売）最高位3位 / 売上13.7万枚\n第5位：One More Kiss（1988/11/21発売）最高位5位 / 売上13.4万枚\n\n---\n\n⚠️ 本動画内の売上データ及び順位は、当時のオリコンチャートの記録を基に構成しています。\n\n皆さんの心に残るレベッカの「最高の1曲」はどれですか？ 🎸\nライブでの衝撃的な思い出や、NOKKOのファッション、歌声に魅了されたエピソードを、ぜひコメント欄で熱く語り合いましょう！`,
                youtubeId: "cZwaHd4tPRU"
            }
        ];

        // --- Main Implementation ---
        const App = () => {
            const [activeVideo, setActiveVideo] = useState(null);
            const [showDetails, setShowDetails] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);
            const [loaded, setLoaded] = useState(false);
            const [showAbout, setShowAbout] = useState(false);
            const [selectedCategory, setSelectedCategory] = useState('すべて');
            const [isLogoFlipped, setIsLogoFlipped] = useState(false);

            useEffect(() => {
                setLoaded(true);
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                document.body.style.overflow = (activeVideo || showAbout) ? 'hidden' : 'auto';
            }, [activeVideo, showAbout]);

            const transmissionLogs = useMemo(() => {
                return [...videos]
                    .filter(v => v.date && !v.date.includes("Coming Soon"))
                    .sort((a, b) => b.date.localeCompare(a.date))
                    .slice(0, 5);
            }, []);

            const filteredVideos = useMemo(() => {
                const order = [1, 2, 3, 4, 7, 5, 8, 10, 11, 14, 15, 18, 9, 6, 13, 12, 16, 17];
                let sorted = [...videos].sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
                return selectedCategory === 'すべて' ? sorted : sorted.filter(v => v.category === selectedCategory);
            }, [selectedCategory]);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            };

            const renderDescription = (text) => {
                if (!text) return null;
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                return text.split(urlRegex).map((part, index) => {
                    if (part.match(urlRegex)) {
                        if (part.includes('embed.music.apple.com')) {
                            const cleanedUrl = part.replace(/&amp;/g, '&');
                            return (
                                <div key={index} className="my-6">
                                    <iframe height="175" width="100%" title={`media-player-${index}`} src={cleanedUrl} sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation" allow="autoplay *; encrypted-media *; clipboard-write" style={{border: '0px', borderRadius: '12px', width: '100%', height: '175px', maxWidth: '660px'}}></iframe>
                                </div>
                            );
                        }
                        if (part.includes('youtube.com') || part.includes('UCpZrfGf1zO3u3v2kul2UqIA')) {
                            return (
                                <div key={index} className="my-4 block text-center md:text-left">
                                    <a href={COMMON_SUB_LINK} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-3 px-6 py-3 bg-[#cc0000] hover:bg-[#ff0000] text-white font-bold tracking-widest rounded-sm transition-all shadow-[0_0_15px_rgba(204,0,0,0.2)] transform hover:-translate-y-0.5">
                                        <YoutubeIcon className="w-5 h-5" /> チャンネル登録して応援お願いします
                                    </a>
                                </div>
                            );
                        }
                        return <a key={index} href={part} target="_blank" rel="noopener noreferrer" className="text-[#cfb991] underline hover:text-white transition-colors break-all">{part}</a>;
                    }
                    return part;
                });
            };

            return (
                <div className="min-h-screen font-sans selection:bg-[#cfb991]/30 selection:text-white bg-[#050505]">
                    <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-700 ${isScrolled ? 'glass-nav py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center text-left">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => window.scrollTo({top:0, behavior:'smooth'})}>
                                <img src={LOGO_URL} alt="logo" className="h-10 opacity-90 text-left" />
                                <span className="hidden md:block text-sm font-zen font-bold tracking-widest text-white uppercase text-glow text-left">次世代への手紙</span>
                            </div>
                            <div className="flex space-x-8 font-lato text-[10px] tracking-widest uppercase text-gray-400">
                                <button onClick={() => scrollToSection('archives')} className="hover:text-white transition-colors text-left" aria-label="アーカイブへ">Archives</button>
                                <button onClick={() => setShowAbout(true)} className="hover:text-white transition-colors text-left" aria-label="番組について">About</button>
                                <button className="hover:text-white transition-colors">Admin</button>
                            </div>
                        </div>
                    </nav>

                    <header className="relative min-h-screen w-full flex flex-col items-center justify-center overflow-hidden py-32 text-center" role="banner">
                        <div className="absolute inset-0 bg-[#050505]">
                             <div className="absolute inset-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?q=80&w=2070')] bg-cover bg-center" aria-hidden="true"></div>
                             <div className="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-[#050505]" aria-hidden="true"></div>
                        </div>
                        <div className={`relative z-10 transition-all duration-1000 transform ${loaded ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                            <div className="mb-10 relative perspective-1000 cursor-pointer group mx-auto text-left" onClick={() => setIsLogoFlipped(!isLogoFlipped)}>
                                <div className={`relative w-72 md:w-[480px] h-48 md:h-64 transition-transform duration-700 transform-style-3d ${isLogoFlipped ? 'rotate-y-180' : ''}`}>
                                    <div className="absolute inset-0 backface-hidden flex items-center justify-center text-left">
                                        <img src={LOGO_URL} alt="Logo" className="w-full h-auto drop-shadow-[0_0_30px_rgba(255,255,255,0.15)]" />
                                    </div>
                                    <div className="absolute inset-0 backface-hidden rotate-y-180 flex items-center justify-center text-left">
                                        <img src={OLD_LOGO_URL} alt="Old Logo" className="w-full h-auto drop-shadow-[0_0_30px_rgba(255,255,255,0.15)]" />
                                    </div>
                                </div>
                                <div className="absolute -inset-10 bg-gradient-to-r from-transparent via-white/5 to-transparent blur-3xl opacity-30 pointer-events-none" aria-hidden="true"></div>
                            </div>
                            <h1 className="font-zen text-4xl md:text-6xl font-bold text-white mb-4 tracking-wider text-glow uppercase text-center">次世代への手紙</h1>
                            <p className="font-mincho text-xl md:text-2xl text-[#cfb991] tracking-[0.5em] mb-12 text-center">ー 不滅の魂 ー</p>
                            <button onClick={() => scrollToSection('archives')} className="px-16 py-4 border border-[#cfb991]/30 hover:border-[#cfb991] text-[10px] tracking-[0.6em] uppercase text-gray-300 transition-all hover:bg-[#cfb991]/5 shadow-[0_0_20px_rgba(204,0,0,0.05)]">Enter Archives</button>
                            
                            <section className="mt-20 w-full max-w-xl mx-auto px-6 animate-in text-left" style={{animationDelay: '0.4s'}}>
                                <div className="flex items-center gap-4 mb-8 text-center justify-center">
                                    <div className="h-[1px] flex-grow bg-gradient-to-r from-transparent to-[#cfb991]/30"></div>
                                    <h2 className="font-cinzel text-[9px] tracking-[0.5em] text-[#cfb991]/70 uppercase text-center">Records of Transmission</h2>
                                    <div className="h-[1px] flex-grow bg-gradient-to-l from-transparent to-[#cfb991]/30"></div>
                                </div>
                                <div className="space-y-0 text-left">
                                    {transmissionLogs.map((log) => (
                                        <div key={log.id} className="log-line group py-4 flex items-center justify-between cursor-pointer" onClick={() => setActiveVideo(log)} role="button">
                                            <div className="flex flex-col gap-1">
                                                <time className="font-lato text-[8px] tracking-widest text-[#cfb991]/50">{log.date.substring(0, 10)}</time>
                                                <span className="font-zen text-[13px] text-gray-300 group-hover:text-white transition-colors line-clamp-1">{log.title}</span>
                                            </div>
                                            <PlayIcon className="w-3 h-3 text-gray-600 group-hover:text-[#cfb991]" />
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-8 flex justify-center"><div className="h-8 w-[1px] bg-gradient-to-b from-[#cfb991]/40 to-transparent"></div></div>
                            </section>
                        </div>
                        <div className="absolute bottom-10 animate-bounce opacity-30 w-full flex justify-center" aria-hidden="true"><ChevronDown className="w-6 h-6" /></div>
                    </header>

                    <main id="archives" className="container mx-auto px-4 py-32 min-h-[600px]">
                        <div className="flex flex-col items-center mb-20 text-center">
                            <h2 className="font-cinzel text-3xl tracking-widest text-gray-200 uppercase">Archives</h2>
                            <nav className="flex flex-wrap justify-center gap-4 mt-12">
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-6 py-2 text-[10px] tracking-widest uppercase border rounded-full transition-all ${selectedCategory === cat ? 'bg-[#cfb991] text-black border-[#cfb991]' : 'border-white/10 text-gray-500 hover:text-white'}`}>{cat}</button>
                                ))}
                            </nav>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-10 gap-y-24 text-left">
                            {filteredVideos.map((v) => (
                                <article key={v.id} className={`group relative animate-in ${v.youtubeId ? 'cursor-pointer' : 'cursor-default'}`} onClick={() => v.youtubeId && setActiveVideo(v)}>
                                    <div className="rounded-sm overflow-hidden bg-[#080808] border border-white/5 transition-all duration-500 group-hover:-translate-y-2 group-hover:border-[#cfb991]/30">
                                        <div className="relative aspect-video overflow-hidden">
                                            <img src={v.thumbnail} alt={v.title} className="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-1000 group-hover:scale-105" loading="lazy" />
                                            {v.youtubeId && (
                                                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <div className="w-14 h-14 rounded-full border border-[#cfb991] bg-black/40 backdrop-blur-sm flex items-center justify-center shadow-lg">
                                                        <PlayIcon className="w-5 h-5 text-[#cfb991] fill-[#cfb991]" />
                                                    </div>
                                                </div>
                                            )}
                                            <div className="absolute top-3 left-3 px-2 py-0.5 bg-[#cfb991]/20 backdrop-blur-md text-[8px] text-[#cfb991] tracking-widest rounded-sm uppercase">{v.category}</div>
                                            <div className="absolute bottom-3 right-3 px-2 py-0.5 bg-black/80 text-[10px] text-gray-400 font-lato">{v.duration}</div>
                                        </div>
                                        <div className="p-6 piano-black-gloss">
                                            <h3 className="font-zen text-base text-gray-200 mb-6 line-clamp-1 group-hover:text-white leading-relaxed">{v.title}</h3>
                                            <div className="flex justify-between items-center text-[10px] font-lato uppercase">
                                                <span className="text-gray-500 flex items-center gap-1 font-bold text-left"><Monitor className="w-3 h-3 text-left" /> {v.views}</span>
                                                <span className={v.youtubeId ? 'text-[#cfb991] font-bold' : 'text-gray-700'}>{v.youtubeId ? 'PLAYBACK' : 'COMING SOON'}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="absolute -bottom-10 left-0 right-0 reflection opacity-0 group-hover:opacity-15 transition-opacity pointer-events-none" aria-hidden="true"><img src={v.thumbnail} alt="" className="grayscale" /></div>
                                </article>
                            ))}
                        </div>
                    </main>

                    {showAbout && (
                        <div className="fixed inset-0 z-[100] bg-[#050505]/98 backdrop-blur-md overflow-y-auto animate-in text-center p-6" role="dialog">
                            <button onClick={() => setShowAbout(false)} className="fixed top-6 right-6 text-gray-500 hover:text-white z-[110] transition-colors p-2 focus:outline-none" aria-label="閉じる"><XIcon className="w-8 h-8" /></button>
                            <div className="container mx-auto px-4 py-24 text-center max-w-4xl relative">
                                <div className="absolute inset-0 opacity-5 pointer-events-none" style={{backgroundImage: 'radial-gradient(circle at center, #cfb991 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                                <img src={LOGO_URL} className="w-32 mx-auto mb-12 opacity-90 drop-shadow-[0_0_15px_rgba(207,185,145,0.2)]" alt="ロゴ" />
                                <h2 className="font-zen text-3xl md:text-5xl font-bold mb-4 uppercase text-white">次世代への手紙<br/><span className="text-xl md:text-2xl mt-4 block font-normal text-gray-400">・リターンズ・</span></h2>
                                <p className="font-mincho text-xl md:text-2xl text-[#cfb991] italic mb-16 tracking-widest leading-relaxed text-center">「不滅の音楽を、もう一度, 新しい形で。」</p>
                                <div className="font-mincho text-gray-300 leading-[2.2] space-y-12 text-justify text-base md:text-lg max-w-3xl mx-auto tracking-wide">
                                    <p className="border-l-2 border-[#cfb991]/30 pl-6 italic">当番組は、昭和・平成の邦楽シーンを彩った名曲たちを、オリコンの公式記録に基づいたランキング形式で紐解く音楽アーカイブチャンネルです。</p>
                                    
                                    <section className="bg-white/5 p-8 md:p-12 rounded-sm border border-white/10 shadow-inner">
                                        <h3 className="font-zen text-xl md:text-2xl text-center mb-8 text-white font-bold tracking-widest flex items-center justify-center gap-3">📜 再始動にあたって</h3>
                                        <p className="mb-8 leading-relaxed text-justify">かつて私はYouTubeで5万人以上のチャンネル登録者さんと共に, 音楽を語り合う時間を過ごしていました。 ある日, 自らの不器用な手違いにより, その大切なチャンネルを一瞬にして消し去ってしまいました。実質1年間という短い運営期間になってしまいました。</p>
                                        <p className="leading-relaxed">応援してくださっていた皆様への申し訳なさと, あまりのショックから, しばらくYouTube活動をお休みしていましたが, 今, ようやく前を向く決心がつきました。 かつてお届けした動画も, 今の視点で丁寧にリメイクし, 新しい息吹を吹き込みながら少しずつ公開していきます。</p>
                                    </section>

                                    <section className="py-8">
                                        <h3 className="font-zen text-xl md:text-2xl text-center mb-8 text-white font-bold tracking-widest flex items-center justify-center gap-3">🎤 番組のスタンス</h3>
                                        <p className="mb-8 leading-relaxed text-justify">私たちは、売上枚数という数字だけで音楽の良し悪しを決めたいわけではありません。 ランキングはあくまで, あの時代にどれだけ多くの人の手にその歌が渡ったかを示す「時代の地図」だと考えています。 順位そのものを楽しむエンターテインメントとして。 そして, その数字の向こう側にある「当時の空気感」や「作り手の執念」を次世代へ語り継ぐ場として、この番組を再構築していきます。</p>
                                    </section>

                                    <div className="grid md:grid-cols-2 gap-8 pt-4">
                                        <div className="bg-gradient-to-br from-white/10 to-transparent p-8 rounded-sm border border-white/5 text-center">
                                            <h4 className="font-zen text-[#cfb991] mb-4 text-lg font-bold">50代以上の皆様へ</h4>
                                            <p className="text-sm opacity-90">イントロ一つで当時の記憶が鮮明に蘇る、良質な時間を。</p>
                                        </div>
                                        <div className="bg-gradient-to-br from-white/10 to-transparent p-8 rounded-sm border border-white/5 text-center">
                                            <h4 className="font-zen text-[#cfb991] mb-4 text-lg font-bold">20〜30代の皆様へ</h4>
                                            <p className="text-sm opacity-90">今のJ-POPの源流にある、本物の音楽の発見を。</p>
                                        </div>
                                    </div>

                                    <div className="text-center space-y-4 pt-8">
                                        <p className="text-lg md:text-xl font-medium text-white tracking-widest">止まっていた時計を、再び動かします。</p>
                                        <p className="text-lg md:text-xl font-medium text-white tracking-widest">また皆様と、不滅の名曲について語り合える場所を育てていければ幸いです。</p>
                                        <p className="text-sm md:text-base font-lato opacity-60 pt-4">2026年2月10日</p>
                                    </div>

                                    <div className="mt-24 border-t border-white/10 pt-16 text-center">
                                        <h3 className="font-zen text-xl md:text-2xl text-white mb-8 font-bold tracking-widest">🔴 チャンネル登録して応援お願いします</h3>
                                        <div className="flex flex-col items-center gap-6">
                                            <a href={COMMON_SUB_LINK} target="_blank" className="inline-flex items-center gap-4 px-12 py-5 bg-[#cc0000] hover:bg-[#ff0000] text-white font-bold tracking-[0.3em] rounded-sm transition-all shadow-2xl transform hover:-translate-y-1 uppercase text-sm">チャンネル登録して応援お願いします</a>
                                            <p className="font-lato text-xs text-gray-500 tracking-widest opacity-50 font-bold">https://www.youtube.com/@次世代への手紙</p>
                                        </div>
                                    </div>
                                    <div className="mt-20 text-right font-zen text-sm text-[#cfb991] tracking-[0.3em] font-medium italic opacity-80 border-r-2 border-[#cfb991] pr-4 inline-block float-right">【不滅の魂 制作委員会】</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeVideo && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-2xl overflow-y-auto animate-in text-left">
                            <div className="min-h-full flex items-center justify-center p-4 md:p-8 text-left">
                                <button onClick={() => { setActiveVideo(null); setShowDetails(false); }} className="fixed top-6 right-6 text-gray-400 hover:text-white z-[110] transition-colors p-2 focus:outline-none"><XIcon className="w-8 h-8" /></button>
                                <div className="w-full max-w-5xl">
                                    <div className="aspect-video bg-black border border-white/10 rounded-sm overflow-hidden mb-10 shadow-[0_0_50px_rgba(207,185,145,0.15)]">
                                        <iframe className="w-full h-full" src={`https://www.youtube.com/embed/${activeVideo.youtubeId}?autoplay=1&rel=0`} frameBorder="0" allowFullScreen title={activeVideo.title}></iframe>
                                    </div>
                                    <div className="border-l-2 border-[#cfb991] pl-8 pb-20 text-left">
                                        <h2 className="font-zen text-2xl md:text-3xl text-white mb-8 leading-tight tracking-wide">{activeVideo.title}</h2>
                                        <div className="font-mincho text-gray-300 text-sm md:text-base leading-relaxed whitespace-pre-wrap">{renderDescription(activeVideo.desc)}</div>
                                        {activeVideo.rankingDetails && (
                                            <div className="mt-12 text-left">
                                                {!showDetails ? (
                                                    <button onClick={() => setShowDetails(true)} className="text-[#cfb991] text-sm font-lato tracking-widest border-b border-[#cfb991] pb-1 hover:text-white transition-colors">
                                                        {activeVideo.category === 'シングル売上ランキング' ? '▼ ランキングの詳細はこちら！' : activeVideo.category === '名曲フラッシュバック' ? '▼ もっと詳細を見る' : '▼ 詳細はこちら'}
                                                    </button>
                                                ) : (
                                                    <div className="animate-in pt-8 border-t border-white/10 mt-8 font-mincho text-gray-300 text-sm md:text-base leading-relaxed whitespace-pre-wrap text-left">
                                                        <div className="mb-10 text-left">{renderDescription(activeVideo.rankingDetails)}</div>
                                                        {activeVideo.id === 1 && (
                                                            <div className="w-full my-8 border border-white/10 rounded-sm overflow-hidden" style={{height: '800px', backgroundColor: '#0f172a'}}>
                                                                <iframe title="MARI HAMADA Archive" width="100%" height="100%" frameBorder="0" srcDoc={HAMADA_MARI_HTML_CONTENT} sandbox="allow-scripts allow-same-origin"></iframe>
                                                            </div>
                                                        )}
                                                        {activeVideo.id === 4 && (
                                                            <div className="w-full my-8 border border-white/10 rounded-sm overflow-hidden" style={{height: '800px', backgroundColor: '#0f172a'}}>
                                                                <iframe title="KOHHY Archive" width="100%" height="100%" frameBorder="0" srcDoc={KOHHY_HTML_CONTENT} sandbox="allow-scripts allow-same-origin"></iframe>
                                                            </div>
                                                        )}
                                                        {activeVideo.id === 5 && (
                                                            <div className="w-full my-8 border border-white/10 rounded-sm overflow-hidden" style={{height: '800px', backgroundColor: '#0f172a'}}>
                                                                <iframe title="THE ALFEE Archive" width="100%" height="100%" frameBorder="0" srcDoc={ALFEE_HTML_CONTENT} sandbox="allow-scripts allow-same-origin"></iframe>
                                                            </div>
                                                        )}
                                                        {activeVideo.id === 18 && (
                                                            <div className="w-full my-8 border border-white/10 rounded-sm overflow-hidden" style={{height: '800px', backgroundColor: '#0f172a'}}>
                                                                <iframe title="REBECCA Archive" width="100%" height="100%" frameBorder="0" srcDoc={REBECCA_HTML_CONTENT} sandbox="allow-scripts allow-same-origin"></iframe>
                                                            </div>
                                                        )}
                                                        <button onClick={() => setShowDetails(false)} className="block mt-8 text-gray-500 text-[10px] tracking-widest hover:text-white uppercase transition-colors font-bold tracking-[0.2em]">▲ CLOSE DETAILS</button>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="py-24 border-t border-white/5 flex flex-col items-center bg-[#020202] text-center">
                        <img src={LOGO_URL} alt="logo" className="h-10 opacity-20 mb-10 grayscale hover:grayscale-0 transition-all" />
                        <div className="flex space-x-10 mb-12 text-gray-600">
                             <a href={COMMON_SUB_LINK} target="_blank" className="hover:text-[#cfb991] transition-colors" aria-label="YouTube"><YoutubeIcon className="w-6 h-6" /></a>
                             <a href="https://x.com/ZZLAB48210" target="_blank" className="hover:text-[#cfb991] transition-colors group" aria-label="Twitter X"><TwitterXIcon className="w-5 h-5"/></a>
                             <a href="https://www.instagram.com/immortalsoul_2026/" target="_blank" className="hover:text-[#cfb991] transition-colors" aria-label="Instagram"><InstagramIcon className="w-6 h-6" /></a>
                        </div>
                        <p className="text-[10px] text-gray-700 tracking-[0.3em] uppercase font-lato text-center">&copy; 2026 次世代への手紙 / 不滅の魂 制作委員会</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
